abstract: |-
  The title overstates on purpose, and the paper spends its length earning the qualification it needs: we have never been intelligent alone. Human organisms hold real and unequal cognitive capacities, but the performances usually offered as proof of intelligence, in mathematics, physics, law, engineering, administration, and now artificial intelligence, are rarely produced by an isolated brain. They are realized by assemblages of trained bodies, notations, instruments, collaborators, procedures, and inherited institutions, and then attributed, after the fact, to a single named person. This paper reads that attribution through Bruno Latour. Latour argued that the modern settlement works by purification, declaring a clean separation between nature and society while its laboratories proliferate the hybrids the separation forbids anyone to name. An analogous settlement governs intelligence. A Cognitive Constitution depends operationally on cognitive hybrids while representationally and normatively purifying their outputs into properties of bounded individuals, and the operation that performs the purification is what the paper calls attributional compression: collaborative production booked to a genius, an educational infrastructure booked to an examination score, a software ecosystem booked to a programmer's talent, a corpus and a data-center booked to a model. The argument keeps four things apart that the folk concept fuses, capacity and performance and realization and historical possibility, so that psychometrics, distributed cognition, and cultural evolution stop reading as rivals and start reading as descriptions of different levels. It rests on the defensible claims, that the realizing system for many advanced tasks exceeds the individual and that purification happens through observable attribution practices, and it declines the contested metaphysical claim that the notebook is literally part of the mind. The closing move is the sharp one: purification is not an error to be debugged but the accounting system of merit, which is why the individual mind survives every demonstration of its insufficiency. Intelligence names a settlement about who gets the credit, and we have been litigating it, under that name, for a long time.
